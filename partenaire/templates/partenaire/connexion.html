<!DOCTYPE html>
<html lang="fr">
<head><meta charset="UTF-8"><title>Connexion Partenaire — CIV Location</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:#fff;border-radius:16px;padding:42px 38px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.brand{text-align:center;margin-bottom:28px}
.brand-logo{font-size:1.8rem;font-weight:800;color:#1a1a2e}.brand-logo span{color:#f39c12}
.brand-sub{font-size:.82rem;color:#888;margin-top:4px}
h2{font-size:1.1rem;font-weight:700;color:#1a1a2e;margin-bottom:18px;text-align:center}
.groupe{margin-bottom:16px}
label{display:block;font-size:.83rem;font-weight:600;color:#555;margin-bottom:5px}
.input-wrap{position:relative}
input{width:100%;padding:11px 13px 11px 40px;border:2px solid #e0e0e0;border-radius:8px;font-size:.93rem;transition:border-color .2s}
input:focus{outline:none;border-color:#f39c12}
.input-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:#bbb}
.btn{width:100%;background:#f39c12;color:#fff;border:none;padding:12px;border-radius:8px;font-size:.97rem;font-weight:700;cursor:pointer;margin-top:4px}
.btn:hover{background:#e08e0b}
.erreur{background:#ffeaea;border:1px solid #f5c6cb;border-radius:8px;padding:11px;color:#721c24;font-size:.87rem;margin-bottom:16px;text-align:center}
.liens{text-align:center;margin-top:18px;font-size:.83rem;color:#888}
.liens a{color:#f39c12;text-decoration:none}

footer.footer-interne{
  background:#1a1a2e;
  color:#555;
  text-align:center;
  padding:18px 20px;
  font-size:.82rem;
  border-top:1px solid rgba(255,255,255,.05);
  width:100%;
  clear:both;
  flex-shrink:0;
}
footer.footer-interne a{color:#f39c12;text-decoration:none}
</style>
</head>
<body>
<div class="card">
  <div class="brand"><div class="brand-logo">CIV<span>Location</span></div><div class="brand-sub">Espace partenaire</div></div>
  <h2><i class="fas fa-lock"></i> Connexion partenaire</h2>
  {% if erreur %}<div class="erreur"><i class="fas fa-exclamation-circle"></i> {{ erreur }}</div>{% endif %}
  <form method="post">
    {% csrf_token %}
    <div class="groupe"><label>Email</label><div class="input-wrap"><i class="fas fa-envelope input-icon"></i><input type="email" name="email" required autofocus></div></div>
    <div class="groupe"><label>Mot de passe</label><div class="input-wrap"><i class="fas fa-lock input-icon"></i><input type="password" name="mot_de_passe" required></div></div>
    <button type="submit" class="btn"><i class="fas fa-sign-in-alt"></i> Se connecter</button>
  </form>
  <div class="liens"><a href="{% url 'accueil' %}"><i class="fas fa-arrow-left"></i> Retour au site</a> &nbsp;|&nbsp; <a href="{% url 'devenir_partenaire' %}">Devenir partenaire</a></div>
</div>
</body></html>
