<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion — Espace Gestion</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:#fff;border-radius:16px;padding:45px 40px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.brand{text-align:center;margin-bottom:30px}
.brand-logo{font-size:2rem;font-weight:800;color:#1a1a2e}.brand-logo span{color:#f39c12}
.brand-sub{font-size:.85rem;color:#888;margin-top:5px}
h2{font-size:1.2rem;font-weight:700;color:#1a1a2e;margin-bottom:20px;text-align:center}
.groupe{margin-bottom:18px}
label{display:block;font-size:.85rem;font-weight:600;color:#555;margin-bottom:6px}
.input-wrap{position:relative}
input{width:100%;padding:12px 14px 12px 42px;border:2px solid #e0e0e0;border-radius:8px;font-size:.95rem;transition:border-color .2s}
input:focus{outline:none;border-color:#f39c12}
.input-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#bbb;font-size:.9rem}
.btn-login{width:100%;background:#f39c12;color:#fff;border:none;padding:13px;border-radius:8px;font-size:1rem;font-weight:700;cursor:pointer;transition:background .2s;margin-top:5px}
.btn-login:hover{background:#e08e0b}
.erreur{background:#ffeaea;border:1px solid #f5c6cb;border-radius:8px;padding:12px;color:#721c24;font-size:.9rem;margin-bottom:18px;text-align:center}
.lien-public{text-align:center;margin-top:20px;font-size:.85rem;color:#888}
.lien-public a{color:#f39c12;text-decoration:none}

footer.footer-interne{
  background:#1a1a2e;
  color:#555;
  text-align:center;
  padding:18px 20px;
  font-size:.82rem;
  border-top:1px solid rgba(255,255,255,.05);
  width:100%;
  clear:both;
  flex-shrink:0;
}
footer.footer-interne a{color:#f39c12;text-decoration:none}
</style>
</head>
<body>
<div class="card">
  <div class="brand">
    <div class="brand-logo">CIV<span>Location</span></div>
    <div class="brand-sub">Espace de gestion interne</div>
  </div>
  <h2><i class="fas fa-lock"></i> Connexion</h2>
  {% if erreur %}<div class="erreur"><i class="fas fa-exclamation-circle"></i> {{ erreur }}</div>{% endif %}
  <form method="post">
    {% csrf_token %}
    <div class="groupe">
      <label>Email</label>
      <div class="input-wrap">
        <i class="fas fa-envelope input-icon"></i>
        <input type="email" name="email" required placeholder="votre@email.com" autofocus>
      </div>
    </div>
    <div class="groupe">
      <label>Mot de passe</label>
      <div class="input-wrap">
        <i class="fas fa-lock input-icon"></i>
        <input type="password" name="mot_de_passe" required placeholder="••••••••">
      </div>
    </div>
    <button type="submit" class="btn-login"><i class="fas fa-sign-in-alt"></i> Se connecter</button>
  </form>
  <div class="lien-public"><a href="{% url 'accueil' %}"><i class="fas fa-arrow-left"></i> Retour au site public</a></div>
</div>
</body>
</html>
